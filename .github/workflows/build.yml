name: Build & Deploy LominoDeploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión a publicar (ej: 1.0.0)'
        required: true

env:
  GO_VERSION: '1.22'
  BINARY_NAME: lominodeploy

jobs:
  build:
    name: Compilar binarios
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goarch: amd64
            goos: linux
          - goarch: arm64
            goos: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Determinar versión
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Compilando versión: $VERSION"

      - name: Compilar
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build \
            -ldflags="-s -w -X main.Version=${{ steps.version.outputs.VERSION }}" \
            -o ${{ env.BINARY_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }} \
            .

      - name: Calcular SHA256
        id: sha
        run: |
          SHA=$(sha256sum ${{ env.BINARY_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }} | cut -d' ' -f1)
          echo "SHA256=$SHA" >> "$GITHUB_OUTPUT"
          echo "$SHA  ${{ env.BINARY_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}" > ${{ env.BINARY_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            ${{ env.BINARY_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}
            ${{ env.BINARY_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}.sha256
          retention-days: 7

  publish:
    name: Publicar GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determinar versión
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Descargar artefactos
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ env.BINARY_NAME }}-linux-*
          merge-multiple: true

      - name: Calcular hashes finales
        id: hashes
        run: |
          SHA_AMD64=$(sha256sum ${{ env.BINARY_NAME }}-linux-amd64 | cut -d' ' -f1)
          SHA_ARM64=$(sha256sum ${{ env.BINARY_NAME }}-linux-arm64 | cut -d' ' -f1)
          echo "SHA_AMD64=$SHA_AMD64" >> "$GITHUB_OUTPUT"
          echo "SHA_ARM64=$SHA_ARM64" >> "$GITHUB_OUTPUT"

      - name: Generar version.json
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          cat > version.json << EOF
          {
            "version": "${VERSION}",
            "released_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "linux_amd64": "${{ steps.hashes.outputs.SHA_AMD64 }}",
            "linux_arm64": "${{ steps.hashes.outputs.SHA_ARM64 }}"
          }
          EOF
          cat version.json

      - name: Crear GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: LominoDeploy v${{ steps.version.outputs.VERSION }}
          body: |
            ## LominoDeploy v${{ steps.version.outputs.VERSION }}

            > Binarios temporalmente en GitHub Releases hasta que LominoLLS esté en producción.

            ### Descargas
            | Plataforma | SHA256 |
            |---|---|
            | linux/amd64 | `${{ steps.hashes.outputs.SHA_AMD64 }}` |
            | linux/arm64 | `${{ steps.hashes.outputs.SHA_ARM64 }}` |
          files: |
            ${{ env.BINARY_NAME }}-linux-amd64
            ${{ env.BINARY_NAME }}-linux-arm64
            version.json
