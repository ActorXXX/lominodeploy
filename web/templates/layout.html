{{define "layout"}}
<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{block "title" .}}LominoDeploy{{end}}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    :root {
      --ld-purple: #7c3aed;
      --ld-purple-soft: #8b5cf6;
      --ld-sidebar-width: 230px;
    }
    body { background: #0f0f14; }
    .sidebar {
      width: var(--ld-sidebar-width);
      background: #17171f;
      border-right: 1px solid #2a2a35;
      min-height: 100vh;
      position: fixed;
      top: 0; left: 0;
      display: flex; flex-direction: column;
      z-index: 100;
    }
    .sidebar-brand {
      padding: 1.25rem 1rem;
      border-bottom: 1px solid #2a2a35;
    }
    .sidebar-brand .logo-badge {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--ld-purple);
      display: inline-flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: .9rem; color: #fff;
    }
    .sidebar-nav .nav-link {
      color: #9ca3af;
      border-radius: 8px;
      margin: 2px 8px;
      padding: 8px 12px;
      font-size: .875rem;
      transition: all .15s;
    }
    .sidebar-nav .nav-link:hover,
    .sidebar-nav .nav-link.active {
      background: #2a2a35;
      color: #fff;
    }
    .sidebar-nav .nav-link .bi { font-size: 1rem; }
    .sidebar-footer {
      margin-top: auto;
      padding: 1rem;
      border-top: 1px solid #2a2a35;
      font-size: .78rem;
      color: #6b7280;
    }
    .main-content {
      margin-left: var(--ld-sidebar-width);
      min-height: 100vh;
    }
    .topbar {
      background: #17171f;
      border-bottom: 1px solid #2a2a35;
      padding: .75rem 1.5rem;
    }
    .card { background: #1c1c26; border: 1px solid #2a2a35; }
    .card-header { background: #222230; border-bottom: 1px solid #2a2a35; }
    .badge-running  { background: #16a34a22; color: #4ade80; border: 1px solid #16a34a44; }
    .badge-stopped  { background: #dc262622; color: #f87171; border: 1px solid #dc262644; }
    .badge-unknown  { background: #37415122; color: #9ca3af; border: 1px solid #37415144; }
    .btn-purple     { background: var(--ld-purple); color: #fff; border: none; }
    .btn-purple:hover { background: var(--ld-purple-soft); color: #fff; }
    .progress { background: #2a2a35; }
    .log-terminal {
      background: #0a0a0f;
      border: 1px solid #2a2a35;
      border-radius: 8px;
      padding: 1rem;
      height: 380px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: .78rem;
      line-height: 1.6;
    }
    .log-info    { color: #d1d5db; }
    .log-success { color: #4ade80; }
    .log-warn    { color: #fbbf24; }
    .log-error   { color: #f87171; }
    .stat-card { background: #1c1c26; border: 1px solid #2a2a35; border-radius: 12px; padding: 1.25rem; }
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main-content { margin-left: 0; }
    }
  </style>
</head>
<body>

{{block "body" .}}{{end}}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{{block "scripts" .}}{{end}}
</body>
</html>
{{end}}

{{define "sidebar"}}
<nav class="sidebar">
  <div class="sidebar-brand d-flex align-items-center gap-2">
    <span class="logo-badge">L</span>
    <div>
      <div class="fw-semibold text-white" style="font-size:.9rem;">LominoDeploy</div>
      <div style="font-size:.7rem; color:#6b7280;">v{{.Version}}</div>
    </div>
  </div>

  <ul class="sidebar-nav nav flex-column pt-2">
    <li><a href="/dashboard" class="nav-link {{if eq .Page "dashboard"}}active{{end}}">
      <i class="bi bi-grid me-2"></i>Dashboard
    </a></li>
    <li><a href="/products/install" class="nav-link {{if eq .Page "catalog"}}active{{end}}">
      <i class="bi bi-plus-circle me-2"></i>Instalar producto
    </a></li>
    <li class="mt-2 px-3 pb-1" style="font-size:.7rem; color:#4b5563; letter-spacing:.08em; text-transform:uppercase;">Sistema</li>
    <li><a href="/settings" class="nav-link {{if eq .Page "settings"}}active{{end}}">
      <i class="bi bi-gear me-2"></i>Configuración
    </a></li>
  </ul>

  <div class="sidebar-footer">
    <div id="update-badge"></div>
    <div class="mt-1">LominoDev © 2026</div>
  </div>
</nav>
{{end}}
